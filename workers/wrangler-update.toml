name = "swiftherb-update-products"
main = "src/update-products.ts"
compatibility_date = "2024-01-01"

# KV Namespace binding (same as products API)
[[kv_namespaces]]
binding = "PRODUCTS"
id = "cc09538377c34c08916ac38a0f5846ed"

# Cron Trigger - runs every 3 hours
[triggers]
crons = ["0 */3 * * *"]  # Every 3 hours at minute 0

# Environment variables
[vars]
ENVIRONMENT = "production"

# Admitad API
# Set via: wrangler secret put ADMITAD_CLIENT_ID
# Set via: wrangler secret put ADMITAD_CLIENT_SECRET
# Set via: wrangler secret put ADMITAD_BASE64_HEADER (optional, auto-generated if not provided)
# Set via: wrangler secret put ADMITAD_ADVCAMPAIGN_ID (iHerb's campaign ID for filtering)
# ADMITAD_API_URL - Optional, defaults to https://api.admitad.com

# Alternative: iHerb API (if available)
# Set via: wrangler secret put IHERB_API_KEY

# For local development/testing
[dev]
port = 8789
local_protocol = "http"
